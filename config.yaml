variant: flatcar
version: 1.0.0
storage:
  files:
    ########################################################################
    # Environment file (wazuh.env)
    #
    # Contains environment variables for the Wazuh deployment.
    # Change passwords before deploying to production.
    ########################################################################
    - path: /etc/systemd/system/wazuh.env
      mode: 0644
      contents:
        inline: |
          # Wazuh indexer (OpenSearch) initial admin password.
          # Change this before deploying to production.
          INDEXER_PASSWORD=SecretPassword123!

          # Wazuh API credentials
          WAZUH_API_USER=wazuh-wui
          WAZUH_API_PASSWORD=MyS3cr3tP4ssw0rd

          # Wazuh indexer JVM heap (minimum 1g recommended)
          INDEXER_JAVA_OPTS=-Xms1g -Xmx1g

          # Docker memory limits
          MANAGER_RAM=1G
          INDEXER_RAM=2G
          DASHBOARD_RAM=1G

    ########################################################################
    # Custom opensearch.yml
    #
    # Overrides the image default to use relative cert paths (resolved
    # from OPENSEARCH_PATH_CONF=/usr/share/wazuh-indexer) so the Java
    # Security Manager permits reading them. Also removes
    # cluster.initial_master_nodes which conflicts with single-node mode.
    ########################################################################
    - path: /opt/wazuh/config/opensearch.yml
      mode: 0644
      contents:
        inline: |
          network.host: "0.0.0.0"
          node.name: "wazuh-indexer"
          cluster.name: "wazuh-cluster"
          discovery.type: single-node
          path.data: /var/lib/wazuh-indexer
          path.logs: /var/log/wazuh-indexer
          plugins.security.ssl.http.pemcert_filepath: certs/indexer.pem
          plugins.security.ssl.http.pemkey_filepath: certs/indexer-key.pem
          plugins.security.ssl.http.pemtrustedcas_filepath: certs/root-ca.pem
          plugins.security.ssl.transport.pemcert_filepath: certs/indexer.pem
          plugins.security.ssl.transport.pemkey_filepath: certs/indexer-key.pem
          plugins.security.ssl.transport.pemtrustedcas_filepath: certs/root-ca.pem
          plugins.security.ssl.http.enabled: true
          plugins.security.ssl.transport.enforce_hostname_verification: false
          plugins.security.ssl.transport.resolve_hostname: false
          plugins.security.authcz.admin_dn:
          - "CN=admin,OU=Wazuh,O=Wazuh,L=California,C=US"
          plugins.security.check_snapshot_restore_write_privileges: true
          plugins.security.enable_snapshot_restore_privilege: true
          plugins.security.nodes_dn:
          - "CN=wazuh-indexer,OU=Wazuh,O=Wazuh,L=California,C=US"
          plugins.security.restapi.roles_enabled:
          - "all_access"
          - "security_rest_api_access"
          plugins.security.system_indices.enabled: true
          plugins.security.system_indices.indices: [".plugins-ml-model", ".plugins-ml-task", ".opendistro-alerting-config", ".opendistro-alerting-alert*", ".opendistro-anomaly-results*", ".opendistro-anomaly-detector*", ".opendistro-anomaly-checkpoints", ".opendistro-anomaly-detection-state", ".opendistro-reports-*", ".opensearch-notifications-*", ".opensearch-notebooks", ".opensearch-observability", ".opendistro-asynchronous-search-response*", ".replication-metadata-store"]
          compatibility.override_main_response_version: true

    ########################################################################
    # Custom opensearch_dashboards.yml
    #
    # Overrides the image default to point opensearch.hosts at the
    # wazuh-indexer container (the default resolves to 127.0.0.1).
    ########################################################################
    - path: /opt/wazuh/config/opensearch_dashboards.yml
      mode: 0644
      contents:
        inline: |
          server.host: "0.0.0.0"
          server.port: 443
          opensearch.hosts: ["https://wazuh-indexer:9200"]
          opensearch.ssl.verificationMode: certificate
          opensearch.username: "kibanaserver"
          opensearch.password: "kibanaserver"
          server.ssl.enabled: true
          server.ssl.key: "/etc/wazuh-dashboard/certs/dashboard-key.pem"
          server.ssl.certificate: "/etc/wazuh-dashboard/certs/dashboard.pem"
          opensearch.ssl.certificateAuthorities: ["/etc/wazuh-dashboard/certs/root-ca.pem"]
          opensearch.requestHeadersAllowlist: ["securitytenant","Authorization"]
          opensearch_security.multitenancy.enabled: false
          opensearch_security.readonly_mode.roles: ["kibana_read_only"]

    ########################################################################
    # Wazuh setup script
    #
    # Generates TLS certificates on first boot, organizes them into
    # per-component directories, and initializes the OpenSearch security
    # index.
    ########################################################################
    - path: /opt/wazuh/setup.sh
      mode: 0755
      contents:
        inline: |
          #!/bin/bash
          set -euo pipefail

          WAZUH_DIR="/opt/wazuh"
          CERTS_DIR="${WAZUH_DIR}/config/certs"

          if [ -f "${CERTS_DIR}/indexer/indexer.pem" ]; then
            echo "Certificates already exist, skipping generation."
            exit 0
          fi

          echo "Generating Wazuh TLS certificates..."
          mkdir -p "${CERTS_DIR}"

          # Create certificate config (ip must be a string, not a list)
          cat > "${WAZUH_DIR}/config/certs.yml" <<CERTSEOF
          nodes:
            indexer:
              - name: "wazuh-indexer"
                ip: "127.0.0.1"
            server:
              - name: "wazuh-manager"
                ip: "127.0.0.1"
            dashboard:
              - name: "wazuh-dashboard"
                ip: "127.0.0.1"
          CERTSEOF

          # Generate certificates
          docker run --rm \
            -v "${WAZUH_DIR}/config/certs.yml:/config/certs.yml:ro" \
            -v "${CERTS_DIR}:/certificates" \
            wazuh/wazuh-certs-generator:0.0.2

          # Organize certs into per-component directories with the
          # filenames each Wazuh image expects.
          mkdir -p "${CERTS_DIR}/indexer" "${CERTS_DIR}/manager" "${CERTS_DIR}/dashboard"

          # Indexer: relative paths resolve from /usr/share/wazuh-indexer/
          cp "${CERTS_DIR}/wazuh-indexer.pem"      "${CERTS_DIR}/indexer/indexer.pem"
          cp "${CERTS_DIR}/wazuh-indexer-key.pem"   "${CERTS_DIR}/indexer/indexer-key.pem"
          cp "${CERTS_DIR}/root-ca.pem"             "${CERTS_DIR}/indexer/root-ca.pem"
          cp "${CERTS_DIR}/admin.pem"               "${CERTS_DIR}/indexer/admin.pem"
          cp "${CERTS_DIR}/admin-key.pem"           "${CERTS_DIR}/indexer/admin-key.pem"

          # Manager: filebeat certs for shipping to indexer
          cp "${CERTS_DIR}/wazuh-manager.pem"       "${CERTS_DIR}/manager/filebeat.pem"
          cp "${CERTS_DIR}/wazuh-manager-key.pem"    "${CERTS_DIR}/manager/filebeat-key.pem"
          cp "${CERTS_DIR}/root-ca.pem"             "${CERTS_DIR}/manager/root-ca.pem"

          # Dashboard: /etc/wazuh-dashboard/certs/
          cp "${CERTS_DIR}/wazuh-dashboard.pem"      "${CERTS_DIR}/dashboard/dashboard.pem"
          cp "${CERTS_DIR}/wazuh-dashboard-key.pem"   "${CERTS_DIR}/dashboard/dashboard-key.pem"
          cp "${CERTS_DIR}/root-ca.pem"              "${CERTS_DIR}/dashboard/root-ca.pem"

          # Indexer runs as UID 1000 — certs must be readable
          chown -R 1000:1000 "${CERTS_DIR}/indexer"
          chmod 644 "${CERTS_DIR}/indexer/"* "${CERTS_DIR}/manager/"* "${CERTS_DIR}/dashboard/"*

          echo "Certificates generated successfully."

    ########################################################################
    # Security initialization script
    #
    # Initializes the OpenSearch security index after the indexer starts.
    # Runs once and waits for the indexer to be ready before proceeding.
    ########################################################################
    - path: /opt/wazuh/init-security.sh
      mode: 0755
      contents:
        inline: |
          #!/bin/bash
          set -euo pipefail

          echo "Waiting for Wazuh indexer to start..."
          for i in $(seq 1 60); do
            if docker exec wazuh-indexer bash -c "curl -sk https://localhost:9200 2>/dev/null | grep -q 'not initialized'" 2>/dev/null; then
              echo "Indexer is up, initializing security..."
              docker exec wazuh-indexer bash -c "
                export JAVA_HOME=/usr/share/wazuh-indexer/jdk
                bash /usr/share/wazuh-indexer/plugins/opensearch-security/tools/securityadmin.sh \
                  -cd /usr/share/wazuh-indexer/opensearch-security/ \
                  -nhnv \
                  -cacert /usr/share/wazuh-indexer/certs/root-ca.pem \
                  -cert /usr/share/wazuh-indexer/certs/admin.pem \
                  -key /usr/share/wazuh-indexer/certs/admin-key.pem \
                  -h localhost
              "
              echo "Security initialized successfully."
              exit 0
            fi
            sleep 5
          done
          echo "ERROR: Timed out waiting for indexer"
          exit 1

    ########################################################################
    # Wazuh indexer (OpenSearch) systemd unit
    #
    # Mounts certs to /usr/share/wazuh-indexer/certs/ (relative paths
    # in opensearch.yml resolve here, within the Java Security Manager's
    # allowed classpath).
    ########################################################################
    - path: /etc/systemd/system/wazuh-indexer.service
      mode: 0644
      contents:
        inline: |
          [Unit]
          Description=Wazuh Indexer (OpenSearch)
          After=docker.service wazuh-setup.service
          Requires=docker.service wazuh-setup.service

          [Service]
          EnvironmentFile=/etc/systemd/system/wazuh.env
          ExecStartPre=-/usr/bin/docker rm -f wazuh-indexer
          ExecStartPre=/bin/mkdir -p /opt/wazuh/indexer-data
          ExecStartPre=/sbin/sysctl -w vm.max_map_count=262144
          ExecStart=/usr/bin/docker run \
            --name wazuh-indexer \
            --memory=${INDEXER_RAM} \
            -p 9200:9200 \
            -e OPENSEARCH_JAVA_OPTS=${INDEXER_JAVA_OPTS} \
            -e OPENSEARCH_INITIAL_ADMIN_PASSWORD=${INDEXER_PASSWORD} \
            -e bootstrap.memory_lock=true \
            -v /opt/wazuh/indexer-data:/var/lib/wazuh-indexer \
            -v /opt/wazuh/config/certs/indexer:/usr/share/wazuh-indexer/certs \
            -v /opt/wazuh/config/opensearch.yml:/usr/share/wazuh-indexer/opensearch.yml:ro \
            --ulimit memlock=-1:-1 \
            --ulimit nofile=65536:65536 \
            wazuh/wazuh-indexer:4.9.2
          ExecStop=/usr/bin/docker stop wazuh-indexer
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target

    ########################################################################
    # Security initialization oneshot unit
    ########################################################################
    - path: /etc/systemd/system/wazuh-security-init.service
      mode: 0644
      contents:
        inline: |
          [Unit]
          Description=Initialize Wazuh Indexer Security
          After=wazuh-indexer.service
          Requires=wazuh-indexer.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/opt/wazuh/init-security.sh

          [Install]
          WantedBy=multi-user.target

    ########################################################################
    # Wazuh manager systemd unit
    ########################################################################
    - path: /etc/systemd/system/wazuh-manager.service
      mode: 0644
      contents:
        inline: |
          [Unit]
          Description=Wazuh Manager
          After=docker.service wazuh-security-init.service
          Requires=docker.service wazuh-security-init.service

          [Service]
          EnvironmentFile=/etc/systemd/system/wazuh.env
          ExecStartPre=-/usr/bin/docker rm -f wazuh-manager
          ExecStartPre=/bin/mkdir -p /opt/wazuh/manager-data /opt/wazuh/manager-etc /opt/wazuh/manager-logs
          ExecStart=/usr/bin/docker run \
            --name wazuh-manager \
            --memory=${MANAGER_RAM} \
            --link wazuh-indexer \
            -p 1514:1514 \
            -p 1515:1515 \
            -p 514:514/udp \
            -p 55000:55000 \
            -e INDEXER_URL=https://wazuh-indexer:9200 \
            -e INDEXER_USERNAME=admin \
            -e INDEXER_PASSWORD=${INDEXER_PASSWORD} \
            -e FILEBEAT_SSL_VERIFICATION_MODE=full \
            -e SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem \
            -e SSL_CERTIFICATE=/etc/ssl/filebeat.pem \
            -e SSL_KEY=/etc/ssl/filebeat-key.pem \
            -v /opt/wazuh/manager-data:/var/ossec/data \
            -v /opt/wazuh/manager-etc:/var/ossec/etc \
            -v /opt/wazuh/manager-logs:/var/ossec/logs \
            -v /opt/wazuh/config/certs/manager:/etc/ssl:ro \
            wazuh/wazuh-manager:4.9.2
          ExecStop=/usr/bin/docker stop wazuh-manager
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target

    ########################################################################
    # Wazuh dashboard systemd unit
    #
    # Mounts a custom opensearch_dashboards.yml that points to the
    # indexer container instead of localhost.
    ########################################################################
    - path: /etc/systemd/system/wazuh-dashboard.service
      mode: 0644
      contents:
        inline: |
          [Unit]
          Description=Wazuh Dashboard
          After=docker.service wazuh-security-init.service wazuh-manager.service
          Requires=docker.service wazuh-security-init.service wazuh-manager.service

          [Service]
          EnvironmentFile=/etc/systemd/system/wazuh.env
          ExecStartPre=-/usr/bin/docker rm -f wazuh-dashboard
          ExecStart=/usr/bin/docker run \
            --name wazuh-dashboard \
            --memory=${DASHBOARD_RAM} \
            --link wazuh-indexer \
            --link wazuh-manager \
            -p 443:443 \
            -e WAZUH_API_URL=https://wazuh-manager \
            -e API_USERNAME=${WAZUH_API_USER} \
            -e API_PASSWORD=${WAZUH_API_PASSWORD} \
            -v /opt/wazuh/config/certs/dashboard:/etc/wazuh-dashboard/certs:ro \
            -v /opt/wazuh/config/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro \
            wazuh/wazuh-dashboard:4.9.2
          ExecStop=/usr/bin/docker stop wazuh-dashboard
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target

    ########################################################################
    # Wazuh setup oneshot unit
    ########################################################################
    - path: /etc/systemd/system/wazuh-setup.service
      mode: 0644
      contents:
        inline: |
          [Unit]
          Description=Wazuh Initial Setup (certificate generation)
          After=docker.service
          Requires=docker.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/opt/wazuh/setup.sh

          [Install]
          WantedBy=multi-user.target

systemd:
  units:
    - name: wazuh-setup.service
      enabled: true
    - name: wazuh-indexer.service
      enabled: true
    - name: wazuh-security-init.service
      enabled: true
    - name: wazuh-manager.service
      enabled: true
    - name: wazuh-dashboard.service
      enabled: true
